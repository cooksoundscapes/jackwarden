[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
ld = 'lld'
pkg-config = 'pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'arm'
cpu = 'armv7l'
endian = 'little'

[properties]
sys_root = '/home/me/rpi-sysroot'
pkg_config_libdir = '/home/me/rpi-sysroot/usr/lib/pkgconfig:/home/me/rpi-sysroot/usr/share/pkgconfig'

[built-in options]
c_args = [
  '--target=armv7l-unknown-linux-gnueabihf',
  '--sysroot=/home/me/rpi-sysroot',
  '-mcpu=cortex-a53',
  '-mfloat-abi=hard']

cpp_args = [
  '--target=armv7l-unknown-linux-gnueabihf',
  '--sysroot=/home/me/rpi-sysroot']

c_link_args = [
  '--target=armv7l-unknown-linux-gnueabihf',
  '--sysroot=/home/me/rpi-sysroot',
  '-fuse-ld=lld']

cpp_link_args = [
  '--target=armv7l-unknown-linux-gnueabihf',
  '--sysroot=/home/me/rpi-sysroot',
  '-fuse-ld=lld']